name: Auto Tag and Publish

on:
  push:
    branches:
      - main
    paths:
      - 'packages/*/package.json'

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  tag-and-publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: '@nisli/core'
            dir: packages/core
            tag-prefix: core
          - name: '@nisli/ssg'
            dir: packages/ssg
            tag-prefix: ssg
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if package version is publishable
        id: version
        run: |
          git fetch --tags
          PACKAGE_NAME="${{ matrix.package.name }}"
          CURRENT_VERSION=$(node -p "require('./${{ matrix.package.dir }}/package.json').version")
          TAG="${{ matrix.package.tag-prefix }}-v$CURRENT_VERSION"

          echo "package=$PACKAGE_NAME" >> $GITHUB_OUTPUT
          echo "current=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

          if npm view "$PACKAGE_NAME@$CURRENT_VERSION" version >/dev/null 2>&1; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "$PACKAGE_NAME@$CURRENT_VERSION already exists on npm, skipping"
          elif git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG exists but $PACKAGE_NAME@$CURRENT_VERSION is not on npm"
            echo "Delete the failed release/tag before retrying this version:"
            echo "gh release delete $TAG --cleanup-tag --yes"
            exit 1
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "$PACKAGE_NAME@$CURRENT_VERSION is publishable"
          fi

      - uses: pnpm/action-setup@v4
        if: steps.version.outputs.changed == 'true'

      - uses: actions/setup-node@v4
        if: steps.version.outputs.changed == 'true'
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install
        if: steps.version.outputs.changed == 'true'
        run: pnpm install --frozen-lockfile

      - name: Build
        if: steps.version.outputs.changed == 'true'
        run: pnpm build

      - name: Test
        if: steps.version.outputs.changed == 'true'
        run: pnpm test

      - name: Upgrade npm (required for OIDC trusted publishing)
        if: steps.version.outputs.changed == 'true'
        run: npm install -g npm@latest

      - name: Create and push tag
        if: steps.version.outputs.changed == 'true'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Create GitHub Release
        if: steps.version.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          gh release create "$VERSION" --title "$VERSION" --generate-notes

      - name: Publish package to npm
        if: steps.version.outputs.changed == 'true'
        run: |
          cd "${{ matrix.package.dir }}"
          npm publish --provenance --access public
